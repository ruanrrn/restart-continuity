  <text x="88" y="214" fill="#FFFFFF" font-family="Georgia, serif" font-size="76" font-weight="700">Restart</text>
  <text x="88" y="290" fill="#EF8354" font-family="Georgia, serif" font-size="76" font-weight="700">Continuity</text>
  <text x="88" y="358" fill="#EAEAEA" font-family="Arial, sans-serif" font-size="32">Resume active work cleanly after restarts</text>
  <text x="88" y="400" fill="#BFC0C0" font-family="Arial, sans-serif" font-size="32">instead of making users repeat themselves.</text>
  <text x="88" y="462" fill="#EAEAEA" font-family="Arial, sans-serif" font-size="26">Persist the top task, carry the critical IDs,</text>
  <text x="88" y="500" fill="#BFC0C0" font-family="Arial, sans-serif" font-size="26">and come back with context intact.</text>

